version: "2"

linters:
  default: none
  enable:
    - staticcheck
    - ineffassign
    - unused
    - nilerr
    - nilnil
    - unconvert
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - misspell
    - errcheck
    - errorlint
    - bodyclose
    - gocritic
    - revive
    - dupl
    - nestif
    - depguard
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: io/ioutil
              desc: "deprecated since Go 1.16: use io and os alternatives"
            - pkg: golang.org/x/net/context
              desc: "use standard library context package"
            - pkg: github.com/pkg/errors
              desc: "use standard library errors and fmt.Errorf(%w)"
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
        - name: package-comments
    staticcheck:
      checks:
        - all
        - "-QF*"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - errorlint
          - revive

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
